# Project-local tool versions for the linerule-cs dev env.
#
# Policy: track latest. Each entry resolves to the newest stable release at
# `mise install` time, so devs picking up a fresh clone always run the same
# tooling CI / Dependabot is testing. global.json keeps `rollForward:
# latestMajor` on the dotnet SDK, and bun's lockfile is regenerated locally
# (see .gitignore), so reproducibility is maintained without freezing
# upstream improvements.

[tools]
dotnet = "latest"
actionlint = "latest"
lefthook = "latest"
typos = "latest"
bun = "latest"   # commitlint package manager + runtime (replaces npm)
