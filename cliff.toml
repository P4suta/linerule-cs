# git-cliff config — drives the rolling-`latest` release-notes generator
# wired into .github/workflows/release.yml. See ADR-0017.
#
# Conventional-commit subject groups feed the body template; `tag_pattern`
# limits the "anchor" tag to semver `v*.*.*`, so the rolling `latest` tag
# (which we delete + recreate on every main push) is never treated as a
# previous release boundary.

[changelog]
header = """
# Changelog

Auto-generated by git-cliff from conventional-commit history. Stable
releases will eventually live at semver tags (`v*.*.*`); until then,
each entry below corresponds to a rolling `latest` snapshot of `main`.

"""
body = """
{% if version -%}
## {{ version }}{% if previous and previous.version %} (since {{ previous.version }}){% endif %}
{% else -%}
## Rolling latest — {{ now() | date(format="%Y-%m-%d") }}
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | trim }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Docs" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Chore" },
  { message = "^style", skip = true },
  { message = "^revert", group = "Revert" },
  { body = ".*BREAKING CHANGE.*", group = "Breaking changes" },
]
filter_commits = false
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
sort_commits = "newest"

[remote.github]
owner = "P4suta"
repo = "linerule-cs"
