# lefthook — git hooks runner.
# Install once with: `just hooks` (or `lefthook install`).
#
# Pre-commit policy: anything a tool can fix mechanically (formatting,
# canonical spelling) is fixed in-place and re-staged. Only checks that
# need human judgment (strict-code violations, malformed workflow YAML,
# bad commit-msg headers) fail the commit. This keeps the hook a help,
# not a hurdle.

# Tools assumed on host PATH — provisioned by `mise install` reading
# project-local mise.toml at the repo root:
#   dotnet (SDK tracks global.json)
#   actionlint
#   typos
#   node + npx (for commitlint)
# Plus `dotnet tool restore` from .config/dotnet-tools.json provides:
#   csharpier (via `dotnet csharpier`)

assert_lefthook_installed: true
no_tty: false
colors: true

# Each command goes through `mise exec --` so the project-pinned versions
# from mise.toml resolve regardless of how the dev shell was activated.
# Lefthook v2 has no top-level `env:`, and the hook script runs under
# /bin/sh which does not inherit `mise activate` shell hooks — `mise exec
# --` is the portable answer. `mise` itself only needs to be on PATH,
# which `~/.local/bin/mise` (its standard install location) satisfies.

pre-commit:
  # Serial so fixers cannot race each other on the same file. Each step
  # restages its writes; the next step sees the canonical form.
  parallel: false
  follow: true
  commands:
    csharpier-format:
      tags: format
      glob: "*.cs"
      run: mise exec -- dotnet csharpier format {staged_files}
      stage_fixed: true

    dotnet-format-style:
      tags: lint
      glob: "*.cs"
      run: mise exec -- dotnet format style --include {staged_files} --no-restore
      stage_fixed: true

    dotnet-format-analyzers:
      tags: lint
      glob: "*.cs"
      run: mise exec -- dotnet format analyzers --include {staged_files} --no-restore
      stage_fixed: true

    typos-fix:
      tags: spell
      run: mise exec -- typos --write-changes {staged_files}
      stage_fixed: true

    # Below this line: checks only — these report violations the author has
    # to address, because no mechanical fix is safe.
    actionlint:
      tags: ci
      glob: "{.github/workflows/*.yml,.github/workflows/*.yaml}"
      run: mise exec -- actionlint -color {staged_files}

    xtask-strict:
      tags: lint
      glob: "*.cs"
      run: mise exec -- dotnet run --project src/Linerule.XTask -- strict-code

commit-msg:
  commands:
    commitlint:
      run: mise exec -- npx --no -- commitlint --edit {1}

pre-push:
  # piped = run in declaration order, stop on first failure. Publish is
  # gated behind a green test run so `artifacts/publish/linerule.exe` is
  # never refreshed from a broken tree.
  piped: true
  commands:
    test:
      run: mise exec -- dotnet test --nologo --no-restore

    publish:
      # Mirrors `just publish` (Justfile) — self-contained Release build
      # for win-x64 dropped at `artifacts/publish/`. Runs only after tests
      # pass, so a clean `git push` always leaves the publish artifact in
      # sync with HEAD (avoids the "ran stale exe and chased a phantom
      # bug" failure mode).
      run: mise exec -- dotnet publish src/Linerule.Cli -c Release -r win-x64 /p:SelfContained=true -o artifacts/publish --nologo -v minimal
