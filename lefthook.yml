# lefthook — git hooks runner.
#
# One-time install: `just hooks` (writes .git/hooks/<event> scripts and
# pulls down commitlint's node deps inside the dev container). The hook
# commands below delegate to Justfile `_hook-*` recipes so every step
# routes through the same `docker compose run --rm dev` / `exec dev`
# logic as `just lint` / `just test` — no tool is ever assumed to exist
# on the WSL host (CLAUDE.md "Docker only").
#
# Pre-commit policy: fixers run first (csharpier / dotnet format / typos)
# and re-stage their writes; checks (actionlint, xtask-strict) follow.
# Pre-push runs the full `just lint` suite + `just test-release` + `just
# publish` so a green push always lands a publish artifact in sync with
# HEAD. To bypass the heavy publish step (e.g. for docs-only pushes), use
# `LEFTHOOK_EXCLUDE=publish git push`.

assert_lefthook_installed: true
no_tty: false
colors: true

pre-commit:
  # Serial so fixers cannot race each other on the same file. Each fixer
  # restages its writes; the next step sees the canonical form.
  parallel: false
  follow: true
  commands:
    csharpier-format:
      tags: format
      glob: "*.cs"
      run: just _hook-csharpier-format {staged_files}
      stage_fixed: true

    dotnet-format-style:
      tags: lint
      glob: "*.cs"
      run: just _hook-dotnet-format-style {staged_files}
      stage_fixed: true

    dotnet-format-analyzers:
      tags: lint
      glob: "*.cs"
      run: just _hook-dotnet-format-analyzers {staged_files}
      stage_fixed: true

    typos-fix:
      tags: spell
      run: just _hook-typos-fix {staged_files}
      stage_fixed: true

    # Below this line: checks only — these report violations the author
    # has to address, because no mechanical fix is safe.
    actionlint:
      tags: ci
      glob: "{.github/workflows/*.yml,.github/workflows/*.yaml}"
      run: just _hook-actionlint {staged_files}

    xtask-strict:
      tags: lint
      glob: "*.cs"
      run: just _hook-xtask-strict

commit-msg:
  commands:
    commitlint:
      run: just _hook-commitlint {1}

pre-push:
  # piped = run in declaration order, stop on first failure. Lint catches
  # the cheap CI-roundtrip mistakes (csharpier drift, format-style drift,
  # typos, actionlint, strict-code). Test runs cross-platform unit suite.
  # Publish keeps `artifacts/publish/linerule.exe` synchronized with HEAD
  # so iterating against a stale binary is impossible.
  piped: true
  commands:
    lint:
      tags: lint
      run: just lint

    test:
      tags: test
      run: just test-release

    publish:
      tags: publish heavy
      run: just publish
