# lefthook — git hooks runner.
# Install once with: `lefthook install` (memory: 2026-wave dev tooling).
# Strict: every hook is a hard fail. No "skip on failure".

# Tools assumed on PATH (mise-managed in the user's WSL env):
#   csharpier (via `dotnet tool restore` + `dotnet csharpier`)
#   typos
#   actionlint
#   npx (for commitlint)
#   dotnet

assert_lefthook_installed: true
no_tty: false
colors: true

pre-commit:
  parallel: true
  follow: true
  commands:
    csharpier-check:
      tags: format
      glob: "*.cs"
      run: dotnet csharpier check {staged_files}
      stage_fixed: false

    dotnet-format-style:
      tags: lint
      glob: "*.cs"
      run: dotnet format style --verify-no-changes --include {staged_files} --no-restore

    dotnet-format-analyzers:
      tags: lint
      glob: "*.cs"
      run: dotnet format analyzers --verify-no-changes --include {staged_files} --no-restore

    typos:
      tags: spell
      run: typos --color always {staged_files}

    actionlint:
      tags: ci
      glob: "{.github/workflows/*.yml,.github/workflows/*.yaml}"
      run: actionlint -color {staged_files}

    xtask-strict:
      tags: lint
      glob: "*.cs"
      run: dotnet run --project src/Linerule.XTask -- strict-code

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}

pre-push:
  # piped = run in declaration order, stop on first failure. Publish is
  # gated behind a green test run so `artifacts/publish/linerule.exe` is
  # never refreshed from a broken tree.
  piped: true
  commands:
    test:
      run: dotnet test --nologo --no-restore

    publish:
      # Mirrors `just publish` (Justfile) — self-contained Release build
      # for win-x64 dropped at `artifacts/publish/`. Runs only after tests
      # pass, so a clean `git push` always leaves the publish artifact in
      # sync with HEAD (avoids the "ran stale exe and chased a phantom
      # bug" failure mode).
      run: dotnet publish src/Linerule.Cli -c Release -r win-x64 /p:SelfContained=true -o artifacts/publish --nologo -v minimal
