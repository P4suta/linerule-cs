# linerule-cs CI.
#
# Policy:
#   - No `on: schedule`. Dependabot is the only scheduled job.
#   - Every action is SHA-pinned; Dependabot bumps weekly.
#   - Coverage is reported, not gated at 100%.
#   - Cross-platform jobs run on ubuntu-latest; Windows-runtime jobs on windows-latest.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger so ADR-0010 AOT artifacts (Cli + App, win-x64) can be
  # pulled to dev machines without opening a PR. Linux dev hosts cannot
  # cross-publish NativeAOT to win-x64 ("Cross-OS native compilation is
  # not supported" from Microsoft.NETCore.Native.Publish.targets), so the
  # windows-latest runner is the only path that produces a runnable .exe.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # for coverage / dependency-review comments
  security-events: write # for CodeQL upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-linux:
    name: build + test (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          # Cache key tracks the per-project lockfiles + SDK pin so the
          # cache only invalidates when an actual transitive dependency
          # moves. setup-dotnet hashes every file in cache-dependency-path.
          cache-dependency-path: |
            **/packages.lock.json
            global.json

      # No `--locked-mode`: GitHub-hosted runner SDK patch versions drift
      # vs the container that generated the lockfile (NU1004 on bundled
      # Microsoft.NET.ILLink.Tasks). The lockfile still drives the cache
      # key, but NuGet is allowed to refresh it silently when SDKs differ.
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore --nologo

      - name: Test (with coverage)
        run: |
          dotnet test -c Release --no-build --nologo \
            --collect:"XPlat Code Coverage" \
            --results-directory artifacts/test-results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-linux
          path: artifacts/test-results/**/coverage.cobertura.xml

      - name: Coverage summary in PR
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95  # v1.3.0
        with:
          filename: artifacts/test-results/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '60 80'

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          recreate: true
          path: code-coverage-results.md

  build-test-windows:
    name: build + test (windows)
    # `windows-latest` is being redirected to `windows-2025-vs2026` by GitHub
    # by 2026-06-15 (notice surfaces as an Annotations entry on every run).
    # Pinning explicitly now silences the annotation; revert to
    # `windows-latest` once the redirect completes and the alias is stable.
    runs-on: windows-2025-vs2026
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/Directory.Packages.props
            global.json

      # No `--locked-mode`: GitHub-hosted runner SDK patch versions drift
      # vs the container that generated the lockfile (NU1004 on bundled
      # Microsoft.NET.ILLink.Tasks). The lockfile still drives the cache
      # key, but NuGet is allowed to refresh it silently when SDKs differ.
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore --nologo
      - run: dotnet test -c Release --no-build --nologo

      - name: Publish (self-contained, win-x64)
        # Mirrors `just publish`: plain self-contained, multi-file. PublishSingleFile
        # errors out on WindowsAppSDK 2.x without EnableMsixTooling, and PublishTrimmed
        # is held back until ADR-0010 (AOT canary) lands.
        run: |
          dotnet publish src/Linerule.Cli -c Release -r win-x64 `
            /p:SelfContained=true `
            -o artifacts/publish

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: linerule-win-x64
          path: artifacts/publish/

  aot-cli:
    # ADR-0010 Phase 2: Cli's `<PublishAot>` is a required gate (was a
    # continue-on-error canary while WinAppSDK + Tomlyn blocked it; Phase 2A
    # retired Tomlyn / ADR-0015, Phase 2B retired WinAppSDK / ADR-0009 dcomp-
    # direct). win-x64 / windows-latest because Cli's TFM is net10.0-windows.
    name: aot publish (cli, windows-latest)
    # See note on `windows-2025-vs2026` in build-test-windows above —
    # explicit pin until GitHub's 2026-06-15 redirect completes.
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
      - run: dotnet publish src/Linerule.Cli -c Release -r win-x64 /p:PublishAot=true -o artifacts/aot

      - name: Upload AOT binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: aot-cli-win-x64
          path: artifacts/aot/

  aot-app:
    # GUI launcher (WinExe). Same constraints as aot-cli — required, win-x64.
    name: aot publish (app, windows-latest)
    # See note on `windows-2025-vs2026` in build-test-windows above —
    # explicit pin until GitHub's 2026-06-15 redirect completes.
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
      - run: dotnet publish src/Linerule.App -c Release -r win-x64 /p:PublishAot=true -o artifacts/aot-dist

      - name: Upload AOT binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: aot-app-win-x64
          path: artifacts/aot-dist/

  aot-xtask:
    # XTask is the one Exe in the repo with no AOT blockers (no Tomlyn, no
    # WinAppSDK, no CsWin32). The job IS allowed to fail the build — it's the
    # smoke test that proves the AOT-readiness machinery (analyzers,
    # BannedSymbols, IPathfulSink, AotBoundary) actually delivers a working
    # native binary, and a regression here means a real reflection vector
    # crept in elsewhere. Per ADR-0010.
    name: aot publish (xtask, linux-x64)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
      - run: dotnet publish src/Linerule.XTask -c Release -r linux-x64 /p:PublishAot=true /p:StripSymbols=true -o artifacts/aot-xtask
      - name: Smoke-test the AOT binary
        run: ./artifacts/aot-xtask/linerule-xtask strict-code

  aot-storage:
    # Library-level AOT publish for Linerule.Diagnostics.Storage. The library
    # carries <IsAotCompatible>true</IsAotCompatible>; this job is the actual
    # verification that the claim is true at every transitive public surface.
    # If reflection creeps into Storage (or anything Storage exposes), the
    # trim/AOT analyzer fails this build. The .so output is discarded — only
    # the build success matters. Per ADR-0010.
    name: aot publish (storage lib, linux-x64)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
      - run: dotnet publish src/Linerule.Diagnostics.Storage -c Release -r linux-x64 /p:PublishAot=true /p:StripSymbols=true -o artifacts/aot-storage

  format:
    name: format (csharpier + dotnet format)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
      - run: dotnet tool restore
      - run: dotnet csharpier check .
      - run: dotnet format --verify-no-changes --severity info

  strict-code:
    name: strict-code (xtask)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
      - run: dotnet run --project src/Linerule.XTask -- strict-code

  spell-check:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17  # v1.46.2

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          /tmp/actionlint -color

  vuln-check:
    name: vulnerable + deprecated packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            global.json
      # No `--locked-mode`: GitHub-hosted runner SDK patch versions drift
      # vs the container that generated the lockfile (NU1004 on bundled
      # Microsoft.NET.ILLink.Tasks). The lockfile still drives the cache
      # key, but NuGet is allowed to refresh it silently when SDKs differ.
      - run: dotnet restore
      - name: dotnet list package --vulnerable
        run: |
          set -euo pipefail
          OUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUT"
          if echo "$OUT" | grep -q '>'; then
            echo "::error::vulnerable packages found"
            exit 1
          fi
      - name: dotnet list package --deprecated
        run: dotnet list package --deprecated --include-transitive

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: true

  conventional-commits:
    name: conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1
