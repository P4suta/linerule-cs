name: codeql

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql analyze (csharp)
    runs-on: windows-latest  # CodeQL needs the same TFM the code targets; net10.0-windows requires Windows.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [csharp]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml
          # Cache the CodeQL tools + extracted dependency graph across runs.
          # First-run cold extract is unchanged; subsequent PRs reuse the
          # cached DB and shave the analyze step from ~7m to ~2-3m.
          dependency-caching: true

      # See note in ci.yml — locked-mode trips NU1004 on bundled framework
      # packages when the runner SDK patch differs from the lockfile's.
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore --nologo

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          category: /language:${{ matrix.language }}
