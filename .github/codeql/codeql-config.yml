name: linerule-cs CodeQL config

# `security-and-quality` is the full suite (security + maintainability + style).
# Empirically (PR #7), swapping to `security-extended` does NOT reduce the
# quality-style alert volume on this codebase — the quality rules below also
# fire under security-extended. The cleanest mechanism is therefore explicit
# `query-filters: exclude` per rule ID under the full suite, which doubles as
# a documented audit trail of "why this rule doesn't apply here."
#
# Rules excluded fall in three buckets:
#
#   (a) Architectural P/Invoke surface. Linerule.Platform.Windows is a
#       deliberate unmanaged-interop boundary (dcomp + D2D + D3D11 + CsWin32);
#       the rule is mechanically correct but tells us nothing.
#
#   (b) Intentional crash-isolation seams. Every hand-written catch(Exception)
#       site is at a thread/loop boundary by design — RenderClock pacer (overlay
#       survives frame failures), WindowsApp.RunAsync (top-level → crash dump),
#       CrashDump.Write (last-resort: never let the dump writer crash the dump
#       path), LogPipeline (async sink isolation), Heartbeat watcher, etc.
#       CodeQL has no construct for "this is the boundary."
#
#   (c) Generator output noise. CsWin32's source-generator emits hundreds of
#       extension methods and marshalling scaffolds under obj/.g.cs that no
#       human authored. `paths-ignore: '**/obj/**'` does NOT reach them — the
#       output is folded into the analyzed assembly representation rather than
#       walked from disk (documented Code Scanning behavior).
#
# Quality on hand-written code is still enforced by Roslyn at error severity
# (.editorconfig promotes IDE0010 / IDE0046 / IDE0058 / IDE0059 / IDE0072 +
# CA1063 / CA1801 / CA1851 / CA2007 / CA2016 / CA2208), plus the strict-code
# xtask audit in CI. CodeQL stays on for security taint flow where it shines.
queries:
  - uses: security-and-quality

paths-ignore:
  - '**/bin/**'
  - '**/obj/**'
  - '**/Generated/**'
  - 'artifacts/**'

query-filters:
  # (a) P/Invoke architectural surface
  - exclude:
      id: cs/call-to-unmanaged-code
  - exclude:
      id: cs/unmanaged-code

  # (b) Intentional crash-isolation
  - exclude:
      id: cs/catch-of-all-exceptions

  # (c) Generator-output / stylistic noise
  - exclude:
      id: cs/missed-ternary-operator
  - exclude:
      id: cs/useless-cast-to-self
  - exclude:
      id: cs/simplifiable-boolean-expression
  - exclude:
      id: cs/constant-condition
  - exclude:
      id: cs/useless-type-test
  - exclude:
      id: cs/path-combine
  - exclude:
      id: cs/missed-readonly-modifier
  - exclude:
      id: cs/useless-gethashcode-call
  - exclude:
      id: cs/useless-assignment-to-local
  - exclude:
      id: cs/linq/missed-select
  - exclude:
      id: cs/useless-upcast
  - exclude:
      id: cs/too-many-ref-parameters
  - exclude:
      id: cs/type-test-of-this
  - exclude:
      id: cs/useless-tostring-call
  - exclude:
      id: cs/complex-condition
